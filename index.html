<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>📚 คลังหนังสือ</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:#020617;color:#F1F5F9}
h1{margin:0;font-size:24px}
.header{padding:20px 16px;border-bottom:1px solid #1E293B}
.search{width:100%;padding:12px;margin-top:12px;border-radius:10px;border:1px solid #334155;background:#1E293B;color:#fff;font-size:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;padding:16px}
.card{background:#0F172A;border:1px solid #1E293B;border-radius:14px;padding:14px;cursor:pointer;min-height:130px}
.card-title{font-weight:700;font-size:14px;margin-bottom:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;margin-top:6px}
.add-card{border:2px dashed #475569;border-radius:14px;padding:14px;cursor:pointer;min-height:130px;display:flex;align-items:center;justify-content:center;flex-direction:column}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100}
.modal{background:#0F172A;border:1px solid #334155;border-radius:20px;width:100%;max-width:440px;padding:24px;max-height:90vh;overflow-y:auto}
input,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid #334155;background:#1E293B;color:#fff;font-size:14px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
.btn-primary{background:#6366F1;color:#fff;flex:1}
.btn-cancel{background:#1E293B;color:#94A3B8;flex:1}
.btn-delete{background:#7F1D1D;color:#FCA5A5;padding:12px 16px}
.row{display:flex;gap:10px;margin-top:16px}
label{font-size:12px;font-weight:600;display:block;margin-bottom:4px;opacity:0.8}
</style>
</head>
<body>
<div class="header">
  <h1>📚 คลังหนังสือ</h1>
  <input class="search" id="search" placeholder="🔍 ค้นหา..." oninput="render()"/>
</div>
<div class="grid" id="grid"></div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title" style="margin:0 0 16px">เพิ่มหนังสือ</h3>
    <input id="f-title" placeholder="ชื่อหนังสือ *"/>
    <input id="f-author" placeholder="ผู้แต่ง"/>
    <label>หมวดหมู่</label>
    <select id="f-genre" style="width:100%;padding:11px;border-radius:10px;border:1px solid #334155;background:#1E293B;color:#fff;font-size:14px;margin-bottom:12px">
      <option>แฟนตาซี</option><option>โรแมนซ์</option><option>ไลท์โนเวล</option>
      <option>มังงะ</option><option>สยองขวัญ</option><option>นิยายวิทยาศาสตร์</option>
      <option>สืบสวน</option><option>ประวัติศาสตร์</option><option>อื่นๆ</option>
    </select>
    <label>สถานะ</label>
    <select id="f-status" style="width:100%;padding:11px;border-radius:10px;border:1px solid #334155;background:#1E293B;color:#fff;font-size:14px;margin-bottom:12px">
      <option>ยังไม่ได้อ่าน</option><option>กำลังอ่าน</option><option>อ่านแล้ว</option><option>หยุดพัก</option>
    </select>
    <div style="display:flex;gap:10px">
      <div style="flex:1"><label>เล่มทั้งหมด</label><input id="f-volumes" type="number" min="0" placeholder="ไม่ระบุ"/></div>
      <div style="flex:1"><label>อ่านแล้ว</label><input id="f-read" type="number" min="0" placeholder="0"/></div>
    </div>
    <textarea id="f-notes" rows="3" placeholder="บันทึก..."></textarea>
    <div class="row">
      <button class="btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-delete" id="btn-del" style="display:none" onclick="deleteBook()">🗑️</button>
      <button class="btn btn-primary" onclick="saveBook()">บันทึก</button>
    </div>
  </div>
</div>

<script>
const COLORS={แฟนตาซี:"#7C3AED",โรแมนซ์:"#DB2777",ไลท์โนเวล:"#0284C7",มังงะ:"#D97706",สยองขวัญ:"#DC2626",นิยายวิทยาศาสตร์:"#059669",สืบสวน:"#7C3AED",ประวัติศาสตร์:"#92400E","อื่นๆ":"#475569"};
const SCOLOR={กำลังอ่าน:"#22C55E",อ่านแล้ว:"#6366F1","ยังไม่ได้อ่าน":"#94A3B8",หยุดพัก:"#F59E0B"};
let books=JSON.parse(localStorage.getItem("books")||"[]"),editId=null;
function save(){localStorage.setItem("books",JSON.stringify(books))}
function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const filtered=books.filter(b=>(b.title+b.author).toLowerCase().includes(q));
  const g=document.getElementById("grid");
  g.innerHTML=`<div class="add-card" onclick="openAdd()"><div style="font-size:28px;color:#6366F1">+</div><div style="font-size:13px;margin-top:4px">เพิ่มหนังสือ</div></div>`;
  filtered.forEach(b=>{
    const c=COLORS[b.genre]||"#475569",s=SCOLOR[b.status]||"#94A3B8";
    const p=b.volumes?Math.min(Math.round((b.readVolumes||0)/b.volumes*100),100):null;
    g.innerHTML+=`<div class="card" onclick="openEdit(${b.id})">
      <div class="card-title">${b.title}</div>
      ${b.author?`<div style="font-size:11px;opacity:0.6">✍️ ${b.author}</div>`:""}
      <span class="badge" style="background:${c}22;color:${c}">${b.genre}</span>
      ${p!==null?`<div style="font-size:11px;margin-top:6px;opacity:0.8">📖 ${p}%</div>`:""}
    </div>`;
  });
}
function openAdd(){editId=null;document.getElementById("modal-title").textContent="📗 เพิ่มหนังสือ";document.getElementById("f-title").value="";document.getElementById("f-author").value="";document.getElementById("f-genre").value="แฟนตาซี";document.getElementById("f-status").value="ยังไม่ได้อ่าน";document.getElementById("f-volumes").value="";document.getElementById("f-read").value="";document.getElementById("f-notes").value="";document.getElementById("btn-del").style.display="none";document.getElementById("modal").style.display="flex"}
function openEdit(id){editId=id;const b=books.find(x=>x.id===id);if(!b)return;document.getElementById("modal-title").textContent="✏️ แก้ไข";document.getElementById("f-title").value=b.title;document.getElementById("f-author").value=b.author||"";document.getElementById("f-genre").value=b.genre;document.getElementById("f-status").value=b.status;document.getElementById("f-volumes").value=b.volumes||"";document.getElementById("f-read").value=b.readVolumes||"";document.getElementById("f-notes").value=b.notes||"";document.getElementById("btn-del").style.display="block";document.getElementById("modal").style.display="flex"}
function closeModal(){document.getElementById("modal").style.display="none"}
function saveBook(){const t=document.getElementById("f-title").value.trim();if(!t)return alert("กรุณากรอกชื่อหนังสือ");const v=parseInt(document.getElementById("f-volumes").value)||"";const r=parseInt(document.getElementById("f-read").value)||0;const book={id:editId||Date.now(),title:t,author:document.getElementById("f-author").value.trim(),genre:document.getElementById("f-genre").value,status:document.getElementById("f-status").value,volumes:v,readVolumes:r,notes:document.getElementById("f-notes").value};if(editId){books=books.map(b=>b.id===editId?book:b)}else{books.push(book)}save();closeModal();render()}
function deleteBook(){if(confirm("ลบหนังสือเล่มนี้?")){{books=books.filter(b=>b.id!==editId);save();closeModal();render()}}}
render();
</script>
</body>
</html>
