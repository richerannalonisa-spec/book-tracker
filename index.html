          {/* 2. Add Publisher Modal */}
          {isAddPublisherOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
              <div className="bg-slate-800 p-5 rounded-xl w-full max-w-xs text-xs relative">

                    <label className="text-slate-400 mb-1 block">ชื่อสำนักพิมพ์ *</label>
                    <input type="text" value={newPub.name} onChange={(e)=>setNewPub({...newPub, name:e.target.value})} className="w-full bg-slate-900 border border-slate-700 p-2 rounded-lg text-white focus:outline-none" />
                  </div>
                  <div>
                    <label className="text-slate-400 mb-1 block">เลือกสีประจำแบรนด์</label>

                  </div>
                  <div className="flex justify-end gap-2 pt-2">
                    <button onClick={() => {
                      setPublishers([...publishers, { id: `pub-${Date.now()}`, ...newPub }]);
                      setIsAddPublisherOpen(false);
                      setNewPub({ name: '', color: '#3B82F6' });
                    }} className="bg-teal-500 text-slate-950 font-bold px-3 py-2 rounded-lg">บันทึก</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 3. Add Series Modal */}
          {isAddSeriesOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
              <div className="bg-slate-800 p-5 rounded-xl w-full max-w-xs text-xs relative">
                <button onClick={() => setIsAddSeriesOpen(false)} className="absolute top-4 right-4 text-slate-400"><XIcon size={16}/></button>

                <div className="space-y-3">
                  <div>
                    <label className="text-slate-400 mb-1 block">ชื่อซีรีส์ชุด *</label>
                    <input type="text" value={newSeries.name} onChange={(e)=>setNewSeries({...newSeries, name:e.target.value})} className="w-full bg-slate-900 border border-slate-700 p-2 rounded-lg text-white" />
                  </div>
                  <div>
                    <label className="text-slate-400 mb-1 block">ผู้แต่ง</label>
                    <input type="text" value={newSeries.author} onChange={(e)=>setNewSeries({...newSeries, author:e.target.value})} className="w-full bg-slate-900 border border-slate-700 p-2 rounded-lg text-white" />
                  </div>
                  <div className="flex justify-end gap-2 pt-2">
                    <button onClick={() => {
                      setSeriesList([...seriesList, { id: `series-${Date.now()}`, ...newSeries }]);
                      setIsAddSeriesOpen(false);
                      setNewSeries({ name: '', author: '' });
                    }} className="bg-teal-500 text-slate-950 font-bold px-3 py-2 rounded-lg">บันทึก</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 4. Add Goal Modal */}
          {isAddGoalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
              <div className="bg-slate-800 p-5 rounded-xl w-full max-w-xs text-xs relative">
                <button onClick={() => setIsAddGoalOpen(false)} className="absolute top-4 right-4 text-slate-400"><XIcon size={16}/></button>
                <h3 className="font-bold text-slate-200 mb-3">สร้างเป้าหมายการอ่าน</h3>
                <div className="space-y-3">
                  <div>
                    <label className="text-slate-400 mb-1 block">ชื่อเป้าหมาย *</label>
                    <input type="text" value={newGoal.title} onChange={(e)=>setNewGoal({...newGoal, title:e.target.value})} className="w-full bg-slate-900 border border-slate-700 p-2 rounded-lg text-white" />
                  </div>
                  <div>
                    <label className="text-slate-400 mb-1 block">ตั้งเป้าจำนวนเล่ม</label>
                    <input type="number" value={newGoal.targetCount} onChange={(e)=>setNewGoal({...newGoal, targetCount:e.target.value})} className="w-full bg-slate-900 border border-slate-700 p-2 rounded-lg text-white" />
                  </div>
                  <div>
                    <label className="text-slate-400 mb-1 block">ช่วงเวลาจับสถิติ (เช่น 2026 หรือ 2026-06)</label>
                    <input type="text" placeholder="เช่น 2026" value={newGoal.period} onChange={(e)=>setNewGoal({...newGoal, period:e.target.value})} className="w-full bg-slate-900 border border-slate-700 p-2 rounded-lg text-white" />
                  </div>
                  <div className="flex justify-end gap-2 pt-2">
                    <button onClick={() => {
                      setGoals([...goals, { id: `goal-${Date.now()}`, ...newGoal }]);
                      setIsAddGoalOpen(false);
                      setNewGoal({ title: '', targetCount: 10, period: '2026' });
                    }} className="bg-teal-500 text-slate-950 font-bold px-3 py-2 rounded-lg">บันทึก</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* === ULTIMATE MOBILE BOTTOM NAVIGATION BAR (EXTREMELY CONVENIENT FOR ONE-HAND USE) === */}
          <nav className="fixed bottom-0 left-0 right-0 bg-[#1E293B] border-t border-slate-800 py-2.5 px-4 flex justify-around items-center z-40 max-w-md mx-auto shadow-2xl rounded-t-2xl">
            <button 
              onClick={() => setActiveTab('dashboard')} 
              className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'dashboard' ? 'text-teal-400 font-bold scale-105' : 'text-slate-400'}`}
            >
              <TrendingUpIcon size={18} />
              <span className="text-[9px]">วิเคราะห์</span>
            </button>
            <button 
              onClick={() => setActiveTab('books')} 
              className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'books' ? 'text-teal-400 font-bold scale-105' : 'text-slate-400'}`}
            >
              <BookIcon size={18} />
              <span className="text-[9px]">คลังหนังสือ</span>
            </button>
            <button 
              onClick={() => setActiveTab('series')} 
              className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'series' ? 'text-teal-400 font-bold scale-105' : 'text-slate-400'}`}
            >
              <LayersIcon size={18} />
              <span className="text-[9px]">ซีรีส์ชุด</span>
            </button>
            <button 
              onClick={() => setActiveTab('goals')} 
              className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'goals' ? 'text-teal-400 font-bold scale-105' : 'text-slate-400'}`}
            >
              <TargetIcon size={18} />
              <span className="text-[9px]">เป้าหมาย</span>
            </button>
            <button 
              onClick={() => setActiveTab('settings')} 
              className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'settings' ? 'text-teal-400 font-bold scale-105' : 'text-slate-400'}`}
            >
              <SettingsIcon size={18} />
              <span className="text-[9px]">สำนักพิมพ์</span>
            </button>
          </nav>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
