<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#020617" />
  <title>🎬 BOOKFLIX - คลังหนังสือ</title>
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#020617; color:#F1F5F9; overflow-x: hidden; }
    .netflix-row { display: flex; gap: 16px; padding: 0 16px 20px; overflow-x: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    .netflix-row::-webkit-scrollbar { display: none; }
    
    /* การ์ดสไตล์ Netflix */
    .book-card { 
      flex: 0 0 145px; width: 145px; cursor: pointer; background: #0F172A; 
      border-radius: 8px; border: 1px solid #1E2937; text-align: center; 
      padding: 0 0 10px 0; position: relative; transition: transform 0.3s ease, box-shadow 0.3s ease; 
      overflow: hidden; display: flex; flex-direction: column;
    }
    .book-card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.2); z-index: 10; }
    
    /* พื้นที่แสดงรูปภาพบนหน้าบัตร */
    .cover-container { width: 100%; height: 160px; background: #1E2937; display: flex; position: relative; overflow: hidden; align-items: center; justify-content: center; }
    .single-cover { width: 100%; height: 100%; object-fit: cover; }
    .split-cover { width: 50%; height: 100%; object-fit: cover; }
    .split-divider { width: 2px; height: 100%; background: #020617; position: absolute; left: 50%; transform: translateX(-50%); z-index: 2; }
    
    .card-info { padding: 8px 8px 0 8px; flex-grow: 1; }
    .progress-container { width: calc(100% - 16px); height: 4px; background: #334155; border-radius: 2px; margin: 8px auto 0 auto; overflow: hidden; }
    .progress-bar { height: 100%; background: #E50914; width: 0%; transition: width 0.3s ease; }
    .row-title { font-size: 18px; font-weight: 800; padding: 24px 16px 12px; color: #fff; }
    
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; alignItems: center; justify-content: center; padding: 16px; overflow-y: auto; }
    .modal { background: #0F172A; padding: 24px; border-radius: 12px; width: 100%; max-width: 420px; border: 1px solid #334155; max-height: 90vh; overflow-y: auto; }
    input, select, textarea { width: 100%; padding: 11px; background: #1E2937; border: 1px solid #334155; border-radius: 8px; color: #fff; margin-top: 4px; margin-bottom: 14px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
    
    .file-input-label { display: block; padding: 10px; background: #334155; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .file-input-label:hover { background: #475569; }
    .preview-box { display: flex; gap: 8px; margin-bottom: 14px; height: 80px; }
    .preview-img { width: 60px; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid #334155; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    const { useState, useEffect } = React;

    let dbInstance = null;
    const DB_NAME = "BookTrackerDB";
    const STORE_NAME = "books";

    async function initDB() {
      return new Promise((resolve, reject) => {
        if (dbInstance) return resolve(dbInstance);
        const request = indexedDB.open(DB_NAME, 3); // ขยับเวอร์ชันเพื่อรองรับฟังก์ชันรูปภาพใหม่
        request.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: "id" });
          }
        };
        request.onsuccess = e => { dbInstance = e.target.result; resolve(dbInstance); };
        request.onerror = e => reject(e.target.error);
      });
    }

    async function getAllBooks() {
      const db = await initDB();
      return new Promise(resolve => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = () => resolve(req.result || []);
      });
    }

    async function saveAllBooks(books) {
      const db = await initDB();
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      store.clear();
      books.forEach(book => store.put(book));
    }

    function App() {
      const [books, setBooks] = useState([]);
      const [selected, setSelected] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [hasLoaded, setHasLoaded] = useState(false);

      // ฟิลด์ข้อมูลของบัตรหนังสือ
      const [titleInput, setTitleInput] = useState("");
      const [authorInput, setAuthorInput] = useState("");
      const [statusInput, setStatusInput] = useState("กำลังอ่าน");
      const [totalPages, setTotalPages] = useState("");
      const [currentPage, setCurrentPage] = useState("");
      
      // ระบบเลือกรูปแบบรูปภาพปกบัตร
      const [imgType, setImgType] = useState("single"); // single หรือ split
      const [imgData1, setImgData1] = useState(""); // ภาพหลัก หรือ ภาพฝั่งซ้าย
      const [imgData2, setImgData2] = useState(""); // ภาพฝั่งขวา (กรณีแบ่งครึ่ง)

      useEffect(() => {
        getAllBooks().then(saved => {
          setBooks(saved);
          setHasLoaded(true); 
        });
      }, []);

      useEffect(() => {
        if (hasLoaded) {
          saveAllBooks(books);
        }
      }, [books, hasLoaded]);

      // ฟังก์ชันแปลงไฟล์ภาพอัปโหลดเป็น Base64
      const handleFileChange = (e, target) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => {
          if (target === 1) setImgData1(reader.result);
          if (target === 2) setImgData2(reader.result);
        };
        reader.readAsDataURL(file);
      };

      const handleSaveBook = (e) => {
        e.preventDefault();
        if (!titleInput.trim()) return alert("กรุณาระบุชื่อหนังสือ");

        const maxId = books.length > 0 ? Math.max(...books.map(b => b.id)) : 0;
        const newBook = {
          id: maxId + 1,
          title: titleInput,
          author: authorInput || "ไม่ระบุผู้แต่ง",
          status: statusInput,
          totalPages: parseInt(totalPages) || 0,
          currentPage: parseInt(currentPage) || 0,
          imgType: imgType,
          imgData1: imgData1,
          imgData2: imgData2
        };

        setBooks(prev => [...prev, newBook]);
        
        // ล้างฟอร์ม
        setTitleInput(""); setAuthorInput(""); setStatusInput("กำลังอ่าน"); setTotalPages(""); setCurrentPage("");
        setImgType("single"); setImgData1(""); setImgData2("");
        setShowAdd(false);
      };

      const handleDeleteBook = (id) => {
        if (confirm("ต้องการลบหนังสือเล่มนี้ใช่หรือไม่?")) {
          setBooks(prev => prev.filter(b => b.id !== id));
          setSelected(null);
        }
      };

      // ฟังก์ชันวาดตัวบัตรหนังสือ (Book Card) หน้าเว็บ
      const renderBookCard = (book) => {
        let progressPercent = 0;
        if (book.status === "อ่านแล้ว") progressPercent = 100;
        else if (book.totalPages > 0 && book.currentPage > 0) {
          progressPercent = Math.min(Math.round((book.currentPage / book.totalPages) * 100), 100);
        }

        return React.createElement('div', {
          key: book.id,
          onClick: () => setSelected(book),
          className: "book-card"
        }, 
          // ส่วนแสดงภาพหน้าปกบนบัตร (รูปเดี่ยว / รูปแบ่งครึ่ง)
          React.createElement('div', {className: "cover-container"},
            book.imgType === "split" ? [
              book.imgData1 ? React.createElement('img', {src: book.imgData1, className: "split-cover", key: "s1"}) : React.createElement('div', {className: "split-cover", style:{display:"flex",alignItems:"center",justifyContainer:"center",fontSize:10}, key: "s1"}, "🖼️ ซ้าย"),
              React.createElement('div', {className: "split-divider", key: "div"}),
              book.imgData2 ? React.createElement('img', {src: book.imgData2, className: "split-cover", key: "s2"}) : React.createElement('div', {className: "split-cover", style:{display:"flex",alignItems:"center",justifyContainer:"center",fontSize:10}, key: "s2"}, "🖼️ ขวา")
            ] : (
              book.imgData1 ? React.createElement('img', {src: book.imgData1, className: "single-cover"}) : React.createElement('span', {style:{fontSize:40}}, "📚")
            )
          ),
          
          // ส่วนข้อมูลอักษรบนบัตร
          React.createElement('div', {className: "card-info"},
            React.createElement('div', {style:{fontWeight:700, fontSize:13, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}, book.title),
            React.createElement('div', {style:{fontSize:11, color:"#94A3B8", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}, book.author)
          ),
          
          // เส้นแถบความคืบหน้าสีแดงด้านล่าง
          progressPercent > 0 && React.createElement('div', {className: "progress-container"},
            React.createElement('div', {className: "progress-bar", style: {width: `${progressPercent}%`}})
          )
        );
      };

      const watchingRow = books.filter(b => b.status === "กำลังอ่าน");
      const queueRow = books.filter(b => b.status === "ยังไม่ได้อ่าน");
      const finishedRow = books.filter(b => b.status === "อ่านแล้ว");

      return React.createElement('div', {style:{minHeight:"100vh", background:"#020617", color:"#F1F5F9", paddingBottom:100}},
        // ส่วนแถบด้านบน (Header)
        React.createElement('div', {style:{padding:"20px 16px", background:"linear-gradient(rgba(15,23,42,0.9),transparent)", display:"flex", justifyContent:"space-between", alignItems:"center", position:"sticky", top:0, zIndex:50, backdropFilter:"blur(8px)"}},
          React.createElement('div', {style:{fontSize:22, fontWeight:900, color:"#E50914", letterSpacing:"-0.5px"}}, "🍿 BOOKFLIX"),
          React.createElement('button', {
            onClick: () => { setIsSyncing(true); setTimeout(() => { setIsSyncing(false); alert("✅ ซิงค์สำเร็จ"); }, 800); },
            disabled: isSyncing,
            style: {padding:"8px 16px", background:"#22C55E", border:"none", borderRadius:4, color:"#000", fontWeight:700, cursor:"pointer", fontSize:13}
          }, isSyncing ? "🔄 ซิงค์อยู่..." : "☁️ ซิงค์ Cloud")
        ),

        // ปุ่มคำสั่งเพิ่มบัตรเล่มใหม่
        React.createElement('div', {style:{padding:"0 16px"}},
          React.createElement('button', {
            onClick: () => setShowAdd(true),
            style: {width:"100%", padding:14, background:"#E50914", border:"none", borderRadius:8, color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", boxShadow:"0 4px 12px rgba(229,9,20,0.3)"}
          }, "+ เพิ่มหนังสือเล่มใหม่")
        ),

        // กลุ่มแถวสไลด์รายชื่อภาพ/บัตรหนังสือ
        React.createElement('div', {}, 
          React.createElement('div', {className: "row-title"}, "กำลังอ่านค้างอยู่ 🍿"),
          React.createElement('div', {className: "netflix-row"}, 
            watchingRow.length > 0 ? watchingRow.map(renderBookCard) : React.createElement('div', {style:{color:"#475569", fontSize:13, padding:10}}, "ไม่มีหนังสือที่กำลังอ่าน")
          )
        ),

        React.createElement('div', {}, 
          React.createElement('div', {className: "row-title"}, "ดองไว้ในคิว ⏳"),
          React.createElement('div', {className: "netflix-row"}, 
            queueRow.length > 0 ? queueRow.map(renderBookCard) : React.createElement('div', {style:{color:"#475569", fontSize:13, padding:10}}, "ไม่มีหนังสือในคิว")
          )
        ),

        React.createElement('div', {}, 
          React.createElement('div', {className: "row-title"}, "อ่านจบแล้ว ✨"),
          React.createElement('div', {className: "netflix-row"}, 
            finishedRow.length > 0 ? finishedRow.map(renderBookCard) : React.createElement('div', {style:{color:"#475569", fontSize:13, padding:10}}, "ยังไม่มีเล่มที่อ่านจบ")
          )
        ),

        // ป็อปอัพหน้าต่างฟอร์ม สำหรับกรอกข้อมูลและอัปโหลดรูปภาพลงบัตร
        showAdd && React.createElement('div', {className: "modal-bg"},
          React.createElement('form', {onSubmit: handleSaveBook, className:"modal"},
            React.createElement('h3', {style:{marginTop:0, color:"#E50914"}}, "เพิ่มรายการลง Bookflix"),
            
            React.createElement('label', {}, "ชื่อหนังสือ:"),
            React.createElement('input', {type:"text", value: titleInput, onChange: e => setTitleInput(e.target.value), required: true, placeholder:"กรอกชื่อหนังสือ"}),
            
            React.createElement('label', {}, "ผู้แต่ง:"),
            React.createElement('input', {type:"text", value: authorInput, onChange: e => setAuthorInput(e.target.value), placeholder:"กรอกชื่อผู้แต่ง"}),

            React.createElement('label', {}, "สถานะการอ่าน:"),
            React.createElement('select', {value: statusInput, onChange: e => setStatusInput(e.target.value)},
              React.createElement('option', {value: "กำลังอ่าน"}, "🍿 กำลังอ่านค้างอยู่"),
              React.createElement('option', {value: "ยังไม่ได้อ่าน"}, "⏳ ดองไว้ในคิว"),
              React.createElement('option', {value: "อ่านแล้ว"}, "✨ อ่านจบแล้ว")
            ),

            React.createElement('div', {style:{display:"flex", gap:10}},
              React.createElement('div', {style:{flex:1}},
                React.createElement('label', {}, "จำนวนหน้าทั้งหมด:"),
                React.createElement('input', {type:"number", value: totalPages, onChange: e => setTotalPages(e.target.value), placeholder:"เช่น 350"})
              ),
              React.createElement('div', {style:{flex:1}},
                React.createElement('label', {}, "อ่านถึงหน้า:"),
                React.createElement('input', {type:"number", value: currentPage, onChange: e => setCurrentPage(e.target.value), placeholder:"เช่น 120"})
              )
            ),

            // --- ส่วนควบคุมระบบรูปภาพบนบัตรแบบใหม่ ---
            React.createElement('label', {}, "รูปแบบรูปหน้าปกบัตร:"),
            React.createElement('select', {value: imgType, onChange: e => { setImgType(e.target.value); setImgData1(""); setImgData2(""); }},
              React.createElement('option', {value: "single"}, "🖼️ รูปเดียวเต็มบัตร"),
              React.createElement('option', {value: "split"}, "🌓 แบ่งครึ่งรูปซ้าย-ขวา")
            ),

            imgType === "single" ? React.createElement('div', {},
              React.createElement('label', {className: "file-input-label"}, "📁 เลือกอัปโหลดรูปหน้าปก"),
              React.createElement('input', {type: "file", accept: "image/*", onChange: e => handleFileChange(e, 1), style:{display:"none"}})
            ) : React.createElement('div', {style:{display:"flex", gap:10}},
              React.createElement('div', {style:{flex:1}},
                React.createElement('label', {className: "file-input-label"}, "📁 รูปฝั่งซ้าย"),
                React.createElement('input', {type: "file", accept: "image/*", onChange: e => handleFileChange(e, 1), style:{display:"none"}})
              ),
              React.createElement('div', {style:{flex:1}},
                React.createElement('label', {className: "file-input-label"}, "📁 รูปฝั่งขวา"),
                React.createElement('input', {type: "file", accept: "image/*", onChange: e => handleFileChange(e, 2), style:{display:"none"}})
              )
            ),

            // แสดงตัวอย่างรูปภาพก่อนกดบันทึกข้อมูล
            (imgData1 || imgData2) && React.createElement('div', {className: "preview-box"},
              imgData1 && React.createElement('img', {src: imgData1, className: "preview-img"}),
              imgData2 && React.createElement('img', {src: imgData2, className: "preview-img"})
            ),

            React.createElement('div', {style:{display:"flex", gap:10, marginTop:10}},
              React.createElement('button', {type:"button", onClick:()=>{ setShowAdd(false); setImgData1(""); setImgData2(""); }, style:{flex:1, padding:12, background:"#334155", border:"none", borderRadius:6, color:"#fff", cursor:"pointer", fontWeight:700}}, "ยกเลิก"),
              React.createElement('button', {type:"submit", style:{flex:1, padding:12, background:"#E50914", border:"none", borderRadius:6, color:"#fff", fontWeight:700, cursor:"pointer"}}, "เพิ่มเข้าคลัง")
            )
          )
        ),

        // หน้าต่างสำหรับเข้าดูข้อมูลเต็มและปุ่มคำสั่งลบข้อมูลบัตรหนังสือ
        selected && React.createElement('div', {className: "modal-bg"},
          React.createElement('div', {className:"modal", style:{textAlign:"center"}},
            React.createElement('div', {className: "cover-container", style:{height:220, borderRadius:8, marginBottom:16}},
              selected.imgType === "split" ? [
                selected.imgData1 && React.createElement('img', {src: selected.imgData1, className: "split-cover", key:"m1"}),
                React.createElement('div', {className: "split-divider", key:"mdiv"}),
                selected.imgData2 && React.createElement('img', {src: selected.imgData2, className: "split-cover", key:"m2"})
              ] : (
                selected.imgData1 ? React.createElement('img', {src: selected.imgData1, className: "single-cover"}) : React.createElement('span', {style:{fontSize:60}}, "📖")
              )
            ),
            React.createElement('h3', {style:{margin:"10px 0"}}, selected.title),
            React.createElement('p', {style:{color:"#94A3B8", margin:"0 0 4px"}}, "ผู้แต่ง: " + selected.author),
            React.createElement('p', {style:{color:"#E50914", fontWeight:700, fontSize:14}}, `สถานะ: ${selected.status}`),
            selected.totalPages > 0 && React.createElement('p', {style:{fontSize:13, color:"#6366F1"}}, `ความคืบหน้า: หน้า ${selected.currentPage} / ${selected.totalPages} (${Math.min(Math.round((selected.currentPage / selected.totalPages) * 100), 100)}%)`),
            
            React.createElement('div', {style:{display:"flex", flexDirection:"column", gap:10, marginTop:20}},
              React.createElement('button', {onClick:()=>handleDeleteBook(selected.id), style:{width:"100%", padding:12, background:"#EF4444", border:"none", borderRadius:6, color:"#fff", fontWeight:700, cursor:"pointer"}}, "🗑️ ลบหนังสือ"),
              React.createElement('button', {onClick:()=>setSelected(null), style:{width:"100%", padding:12, background:"#334155", border:"none", borderRadius:6, color:"#fff", cursor:"pointer"}}, "ปิด")
            )
          )
        )
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>
</body>
</html>
